<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Arrazus - Controle de Comissão</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.topo{
text-align:center;
margin-bottom:40px;
}

.topo h1{
font-size:42px;
color:#d4af37;
margin-bottom:10px;
}

.topo p{
color:#ccc;
}

.card{
background:#181818;
padding:25px;
border-radius:20px;
margin-bottom:30px;
box-shadow:0 0 20px rgba(212,175,55,.2);
}

.card h2{
margin-bottom:20px;
color:#d4af37;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#252525;
color:white;
}

button{
padding:15px;
border:none;
border-radius:12px;
background:#d4af37;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#d4af37;
color:black;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #333;
}

.resumo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.box{
background:#181818;
padding:25px;
border-radius:20px;
text-align:center;
}

.box h3{
margin-bottom:10px;
color:#d4af37;
}

.valor{
font-size:30px;
font-weight:bold;
}

.excluir{
background:#ff4444;
color:white;
padding:8px 15px;
}

</style>
</head>

<body>

<div class="container">

<div class="topo">
<h1>STUDIO ARRAZUS</h1>
<p>Controle Profissional de Comissão</p>
</div>

<div class="card">

<h2>Novo Procedimento</h2>

<div class="form-grid">

<input type="text" id="procedimento" placeholder="Procedimento">

<input type="text" id="profissionalNome" placeholder="Nome do Profissional">

<input type="date" id="data">

<input type="number" id="valor" placeholder="Valor Total">

<button onclick="adicionar()">Adicionar</button>

</div>

</div>

<div class="card">

<h2>Procedimentos Registrados</h2>

<table>

<thead>
<tr>
<th>Procedimento</th>
<th>Profissional</th>
<th>Data</th>
<th>Valor Total</th>
<th>Profissional 80%</th>
<th>Salão 20%</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<div class="resumo">

<div class="box">
<h3>Total Faturado</h3>
<div class="valor" id="totalFaturado">R$ 0,00</div>
</div>

<div class="box">
<h3>Total Profissional</h3>
<div class="valor" id="totalProfissional">R$ 0,00</div>
</div>

<div class="box">
<h3>Total Salão</h3>
<div class="valor" id="totalSalao">R$ 0,00</div>
</div>

</div>

</div>

<script>

let totalFaturado = 0;
let totalProfissional = 0;
let totalSalao = 0;

function atualizar(){
document.getElementById("totalFaturado").innerText = "R$ " + totalFaturado.toFixed(2);
document.getElementById("totalProfissional").innerText = "R$ " + totalProfissional.toFixed(2);
document.getElementById("totalSalao").innerText = "R$ " + totalSalao.toFixed(2);
}

function salvarDados(){

let linhas = document.querySelectorAll("#tabela tr");

let dados = [];

linhas.forEach(linha => {
dados.push({
procedimento: linha.cells[0].innerText,
profissional: linha.cells[1].innerText,
data: linha.cells[2].innerText,
valor: linha.cells[3].innerText
});
});

localStorage.setItem("procedimentos", JSON.stringify(dados));

localStorage.setItem("totais", JSON.stringify({
faturado: totalFaturado,
profissional: totalProfissional,
salao: totalSalao
}));

}

function adicionar(){

let procedimento = document.getElementById("procedimento").value;
let profissionalNome = document.getElementById("profissionalNome").value;
let data = document.getElementById("data").value;
let valor = parseFloat(document.getElementById("valor").value);

if(!procedimento || !profissionalNome || !data || !valor){
alert("Preencha todos os campos.");
return;
}

let profissional = valor * 0.80;
let salao = valor * 0.20;

let tabela = document.getElementById("tabela");
let linha = tabela.insertRow();

linha.innerHTML = `
<td>${procedimento}</td>
<td>${profissionalNome}</td>
<td>${data}</td>
<td>R$ ${valor.toFixed(2)}</td>
<td>R$ ${profissional.toFixed(2)}</td>
<td>R$ ${salao.toFixed(2)}</td>
<td>
<button class="excluir" onclick="remover(this, ${valor}, ${profissional}, ${salao})">
Excluir
</button>
</td>
`;

totalFaturado += valor;
totalProfissional += profissional;
totalSalao += salao;

atualizar();
salvarDados();

document.getElementById("procedimento").value = "";
document.getElementById("profissionalNome").value = "";
document.getElementById("data").value = "";
document.getElementById("valor").value = "";
}

function remover(btn,valor,profissional,salao){

btn.parentElement.parentElement.remove();

totalFaturado -= valor;
totalProfissional -= profissional;
totalSalao -= salao;

atualizar();
salvarDados();
}

window.onload = function(){

let dados = JSON.parse(localStorage.getItem("procedimentos")) || [];

dados.forEach(item => {

let tabela = document.getElementById("tabela");
let linha = tabela.insertRow();

let valor = parseFloat(item.valor.replace("R$","")) || 0;
let profissional = valor * 0.80;
let salao = valor * 0.20;

linha.innerHTML = `
<td>${item.procedimento}</td>
<td>${item.profissional}</td>
<td>${item.data}</td>
<td>${item.valor}</td>
<td>R$ ${profissional.toFixed(2)}</td>
<td>R$ ${salao.toFixed(2)}</td>
<td>
<button class="excluir" onclick="remover(this, ${valor}, ${profissional}, ${salao})">
Excluir
</button>
</td>
`;

totalFaturado += valor;
totalProfissional += profissional;
totalSalao += salao;

});

atualizar();
};

</script>

</body>
</html>
